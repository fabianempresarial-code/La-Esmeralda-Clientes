<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pide en Línea - Asadero La Esmeralda</title>
    <style>
        :root{--bg:#0f172a;--card:#1e293b;--accent:#f59e0b;--accent2:#ef4444;--text:#ffffff;--soft:#334155;}
        body{margin:0;font-family:system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}

        header{background:linear-gradient(135deg,var(--accent),var(--accent2));padding:20px;text-align:center;font-weight:900;color:white;position:sticky;top:0;z-index:100;box-shadow:0 4px 10px rgba(0,0,0,0.3);letter-spacing:1px;}

        .main-wrapper{max-width:800px;margin:auto;padding:20px;padding-bottom: 140px;}

        .card{background:var(--card);padding:20px;border-radius:24px;margin-bottom:15px;box-shadow:0 10px 25px rgba(0,0,0,0.4);border:1px solid rgba(255,255,255,0.05);}
        .grid{display:grid;grid-template-columns:repeat(auto-fill, minmax(60px, 1fr));gap:10px;}
        .btn{padding:14px;border:none;border-radius:14px;background:var(--soft);color:white;cursor:pointer;font-weight:bold;transition:0.2s;}
        .btn.active{background:var(--accent);color:#000;}

        .hidden { display: none !important; }
        .input-field { width:100%; padding:15px; border-radius:12px; border:1px solid var(--soft); background:#020617; color:white; font-size:16px; margin-bottom:10px; box-sizing:border-box;}

        .cat-container { display: flex; overflow-x: auto; gap: 8px; margin-bottom: 15px; padding-bottom: 5px; scrollbar-width: none;}
        .btn-cat { flex: 0 0 auto; padding: 10px 18px; border: 1px solid var(--soft); border-radius: 20px; background: #020617; color: white; cursor: pointer; font-size: 14px; font-weight: bold;}
        .btn-cat.active { background: var(--accent); color: #000; border-color: var(--accent); }

        .chips-container{display:grid;grid-template-columns:repeat(auto-fill, minmax(160px, 1fr));gap:12px;margin-top:15px;}
        .chip{
            display:flex; flex-direction:column; gap:8px; padding:12px; background:#020617;
            border:1px solid var(--soft); border-radius:18px; cursor:pointer;
        }
        .chip img { width:100%; height:100px; border-radius:12px; object-fit:cover; }
        .chip-info b { display:block; font-size:14px; color:#ffffff; }
        .chip-info span { color:var(--accent); font-weight:bold; }

        .item-pedido {
            display:flex; justify-content:space-between; align-items:center;
            background:rgba(0,0,0,0.4); padding:12px; border-radius:14px; margin-bottom:10px;
        }

        .compact-footer {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(10px);
            border-top: 2px solid var(--accent);
            z-index: 1000; padding: 15px;
        }

        .footer-content { display: flex; justify-content: space-between; align-items: center; max-width: 800px; margin: auto; }
        .footer-total { font-size: 1.6rem; font-weight: 900; color: #fff; margin: 0; }
        .btn-send { background:#22c55e; padding: 15px 30px; border-radius: 15px; border:none; color:white; font-weight:900; cursor:pointer; font-size: 16px; box-shadow: 0 4px 15px rgba(34,197,94,0.4);}

        label{display:block; margin-bottom:8px; font-size:11px; color:var(--accent); text-transform:uppercase; font-weight:800; letter-spacing:1px;}
        .del-btn { background:var(--accent2); color:white; border:none; border-radius:50%; width:28px; height:28px; cursor:pointer; font-weight:bold; }
    </style>
</head>
<body>

<header>
    🍴 ASADERO LA ESMERALDA - PEDIDOS
</header>

<div class="main-wrapper">
    <div class="card">
        <label>🛵 ¿A dónde enviamos?</label>
        <div class="grid" style="grid-template-columns: 1fr 1fr;">
            <button class="btn active" id="btnLocal" onclick="setServicio('local')">ESTOY EN LOCAL</button>
            <button class="btn" id="btnDomi" onclick="setServicio('domicilio')">DOMICILIO</button>
        </div>
        
        <div id="formDomicilio" class="hidden" style="margin-top:15px;">
            <input type="text" id="domiNombre" class="input-field" placeholder="Tu Nombre">
            <input type="text" id="domiDir" class="input-field" placeholder="Dirección Completa">
        </div>

        <div id="sectionMesas" style="margin-top:15px;">
            <label>📍 Número de tu Mesa</label>
            <div class="grid" id="mesas"></div>
        </div>
    </div>

    <div class="card">
        <label>📖 Nuestro Menú</label>
        <div id="cat-list" class="cat-container"></div>
        <div id="chips-menu" class="chips-container"></div>
    </div>

    <div class="card">
        <label>🛒 Tu Pedido</label>
        <div id="resumen-lista"></div>
        <p id="vacio-msg" style="text-align:center; color:var(--soft);">Aún no has agregado nada</p>
    </div>
</div>

<div class="compact-footer">
    <div class="footer-content">
        <div>
            <span style="font-size:11px; color:var(--accent); font-weight:800;">TOTAL A PAGAR</span>
            <p class="footer-total" id="total-val">$0</p>
        </div>
        <button class="btn-send" onclick="enviarWhatsApp()">ENVIAR PEDIDO</button>
    </div>
</div>

<script>
// --- CONFIGURACIÓN CLIENTE ---
const WHATSAPP_NEGOCIO = "573000000000"; // CAMBIA ESTE NÚMERO
const URL_MENU = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTU3FT66_0vVAygWPIDfjIAhGwnKGWeBhDB3cVrzkMZQRP6M0ONz2_xwy-u8Q7muAoP6oa4QFxXc7xb/pub?output=csv";
const PRECIO_DOMICILIO = 2000; // Valor del domicilio si es necesario

let menu = [], pedido = [], tipoServicio = 'local', mesaSeleccionada = "";

// --- CARGA DE DATOS ---
async function cargarMenu() {
    try {
        const res = await fetch(URL_MENU);
        const text = await res.text();
        const rows = text.split('\n').slice(1);
        
        menu = rows.map(row => {
            const cols = row.split(',');
            return { cat: cols[0], nombre: cols[1], precio: parseInt(cols[3]?.replace(/[^0-9]/g, '')) || 0, img: cols[4]?.trim() };
        }).filter(m => m.nombre);

        renderCategorias();
        crearMesasSelector();
    } catch (e) { alert("Error al cargar el menú"); }
}

function renderCategorias() {
    const cats = [...new Set(menu.map(m => m.cat))].filter(Boolean);
    const cont = document.getElementById("cat-list");
    cont.innerHTML = cats.map((c, i) => `<button class="btn-cat ${i===0?'active':''}" onclick="filtrarCat('${c}', this)">${c}</button>`).join("");
    filtrarCat(cats[0], cont.firstChild);
}

function filtrarCat(cat, btn) {
    document.querySelectorAll('.btn-cat').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const cont = document.getElementById("chips-menu");
    cont.innerHTML = menu.filter(m => m.cat === cat).map(p => `
        <div class="chip" onclick="agregarAlPedido('${p.nombre}')">
            <img src="${p.img || 'https://via.placeholder.com/150'}">
            <div class="chip-info"><b>${p.nombre}</b><span>$${p.precio.toLocaleString()}</span></div>
        </div>`).join("");
}

function crearMesasSelector() {
    const cont = document.getElementById("mesas");
    for(let i=1; i<=12; i++) {
        let b = document.createElement("button"); b.className="btn"; b.textContent=i;
        b.onclick = () => {
            document.querySelectorAll("#mesas .btn").forEach(x => x.classList.remove("active"));
            b.classList.add("active"); mesaSeleccionada = i;
        };
        cont.appendChild(b);
    }
}

// --- LÓGICA DE PEDIDO ---
function setServicio(t) {
    tipoServicio = t;
    document.getElementById('btnLocal').classList.toggle('active', t === 'local');
    document.getElementById('btnDomi').classList.toggle('active', t === 'domicilio');
    document.getElementById('formDomicilio').classList.toggle('hidden', t === 'local');
    document.getElementById('sectionMesas').classList.toggle('hidden', t === 'domicilio');
    actualizarTotales();
}

function agregarAlPedido(nombre) {
    const item = menu.find(m => m.nombre === nombre);
    pedido.push({...item});
    actualizarResumen();
}

function quitarDelPedido(nombre) {
    const idx = pedido.findIndex(p => p.nombre === nombre);
    if(idx !== -1) pedido.splice(idx, 1);
    actualizarResumen();
}

function actualizarResumen() {
    const cont = document.getElementById("resumen-lista");
    document.getElementById("vacio-msg").style.display = pedido.length ? "none" : "block";
    
    const agrupado = pedido.reduce((acc, curr) => {
        if(!acc[curr.nombre]) acc[curr.nombre] = {...curr, cant: 0};
        acc[curr.nombre].cant++;
        return acc;
    }, {});

    cont.innerHTML = Object.values(agrupado).map(p => `
        <div class="item-pedido">
            <div style="flex:1;"><b>${p.nombre}</b><br><small>Cant: ${p.cant}</small></div>
            <b style="color:var(--accent); margin-right:15px;">$${(p.precio * p.cant).toLocaleString()}</b>
            <button class="del-btn" onclick="quitarDelPedido('${p.nombre}')">✕</button>
        </div>`).join("");
    
    actualizarTotales();
}

function actualizarTotales() {
    let t = pedido.reduce((s, p) => s + p.precio, 0);
    if(tipoServicio === 'domicilio' && pedido.length > 0) t += PRECIO_DOMICILIO;
    document.getElementById("total-val").textContent = `$${t.toLocaleString()}`;
}

// --- ENVÍO ---
function enviarWhatsApp() {
    if(!pedido.length) return alert("Agrega algo al pedido primero");
    
    let msg = `🔥 *NUEVO PEDIDO - LA ESMERALDA*\n`;
    msg += `--------------------------\n`;
    
    if(tipoServicio === 'local') {
        if(!mesaSeleccionada) return alert("Por favor selecciona tu número de mesa");
        msg += `📍 *MESA:* ${mesaSeleccionada}\n`;
    } else {
        const nom = document.getElementById("domiNombre").value;
        const dir = document.getElementById("domiDir").value;
        if(!nom || !dir) return alert("Por favor completa tus datos de entrega");
        msg += `🛵 *DOMICILIO*\n👤 *Cliente:* ${nom}\n📍 *Dirección:* ${dir}\n`;
    }

    msg += `--------------------------\n`;
    const agrupado = pedido.reduce((acc, curr) => {
        acc[curr.nombre] = (acc[curr.nombre] || 0) + 1;
        return acc;
    }, {});

    for(const [nombre, cant] of Object.entries(agrupado)) {
        msg += `✅ ${cant}x ${nombre}\n`;
    }

    let total = pedido.reduce((s, p) => s + p.precio, 0);
    if(tipoServicio === 'domicilio') {
        msg += `\n🛵 Domicilio: $${PRECIO_DOMICILIO.toLocaleString()}`;
        total += PRECIO_DOMICILIO;
    }

    msg += `\n💰 *TOTAL A PAGAR: $${total.toLocaleString()}*`;
    msg += `\n--------------------------\n_Pedido enviado desde la App Web_`;

    window.open(`https://wa.me/${WHATSAPP_NEGOCIO}?text=${encodeURIComponent(msg)}`);
}

cargarMenu();
</script>
</body>
</html>

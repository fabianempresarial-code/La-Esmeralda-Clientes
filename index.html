<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Menú Digital - Asadero La Esmeralda</title>
    <style>
        :root{--bg:#0f172a;--card:#1e293b;--accent:#f59e0b;--accent2:#ef4444;--text:#ffffff;--soft:#334155;--success:#22c55e;}
        body{margin:0;font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;scroll-behavior: smooth;}

        header{background:linear-gradient(135deg,var(--accent),var(--accent2));padding:18px;text-align:center;font-weight:900;color:white;position:sticky;top:0;z-index:100;box-shadow:0 4px 15px rgba(0,0,0,0.4);font-size:1.1rem;letter-spacing:1px;}

        .main-wrapper{max-width:600px;margin:auto;padding:15px;padding-bottom:180px;}

        .card{background:var(--card);padding:18px;border-radius:20px;margin-bottom:15px;border:1px solid rgba(255,255,255,0.05);box-shadow:0 10px 15px -3px rgba(0,0,0,0.1);}
        .grid{display:grid;grid-template-columns:repeat(4, 1fr);gap:8px;}
        
        .btn{padding:12px;border:none;border-radius:12px;background:var(--soft);color:white;cursor:pointer;font-weight:bold;transition:0.2s;}
        .btn.active{background:var(--accent);color:#000;transform:scale(0.95);}

        .input-field { width:100%; padding:12px; border-radius:10px; border:1px solid var(--soft); background:#020617; color:white; margin-bottom:8px; box-sizing:border-box; font-family:inherit;}

        .cat-container { display: flex; overflow-x: auto; gap: 8px; margin-bottom: 15px; padding-bottom: 5px; scrollbar-width: none; -webkit-overflow-scrolling: touch;}
        .cat-container::-webkit-scrollbar { display: none; }
        .btn-cat { flex: 0 0 auto; padding: 10px 18px; border: 1px solid var(--soft); border-radius: 20px; background: #020617; color: white; cursor: pointer; font-size: 13px; font-weight: bold;}
        .btn-cat.active { background: var(--accent); color: #000; border-color: var(--accent); }

        .chips-container{display:grid;grid-template-columns: 1fr 1fr; gap:12px;}
        .chip{ display:flex; flex-direction:column; background:#020617; border:1px solid var(--soft); border-radius:15px; overflow:hidden; cursor:pointer; transition: 0.2s;}
        .chip:active { transform: scale(0.96); }
        .chip img { width:100%; height:115px; object-fit:cover; background:#1e293b;}
        .chip-info { padding:10px; }
        .chip-info b { display:block; font-size:13px; color:#ffffff; height: 32px; overflow: hidden; margin-bottom: 5px; line-height: 1.2;}
        .chip-info span { color:var(--accent); font-weight:800; font-size:16px;}

        .item-pedido { display:flex; justify-content:space-between; align-items:center; background:rgba(0,0,0,0.3); padding:10px; border-radius:12px; margin-bottom:8px; border-left: 3px solid var(--accent);}

        .compact-footer { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(10px); border-top: 2px solid var(--accent); z-index: 1000; padding: 15px; }
        .footer-content { display: flex; justify-content: space-between; align-items: center; max-width: 600px; margin: auto; }
        .btn-send { background:var(--success); padding: 14px 20px; border-radius: 12px; border:none; color:white; font-weight:900; cursor:pointer; box-shadow: 0 4px 10px rgba(34, 197, 94, 0.3);}

        .pay-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-top: 10px; }
        .pay-btn { padding: 8px; border-radius: 8px; border: none; font-size: 10px; font-weight: 800; cursor: pointer; text-align: center; text-decoration: none; color: white; }

        label{display:block; margin-bottom:6px; font-size:10px; color:var(--accent); text-transform:uppercase; font-weight:800; letter-spacing: 1px;}
        .del-btn { background:var(--accent2); color:white; border:none; border-radius:8px; width:28px; height:28px; cursor:pointer; font-weight: bold;}
        .hidden { display: none !important; }
    </style>
</head>
<body>

<header>🔥 ASADERO LA ESMERALDA</header>

<div class="main-wrapper">
    <div class="card">
        <label>📍 ¿Cómo deseas tu pedido?</label>
        <div class="grid" style="grid-template-columns: 1fr 1fr; margin-bottom:10px;">
            <button class="btn active" id="btnLocal" onclick="setServicio('local')">EN EL LOCAL</button>
            <button class="btn" id="btnDomi" onclick="setServicio('domicilio')">DOMICILIO</button>
        </div>
        
        <div id="formDomicilio" class="hidden">
            <input type="text" id="domiNombre" class="input-field" placeholder="Tu Nombre">
            <input type="text" id="domiDir" class="input-field" placeholder="Dirección de entrega y Barrio">
        </div>

        <div id="sectionMesas">
            <label>Selecciona tu Mesa:</label>
            <div class="grid" id="mesas"></div>
        </div>

        <label style="margin-top:10px;">📝 Observaciones del pedido:</label>
        <input type="text" id="observaciones" class="input-field" placeholder="Ej: Sin cebolla, gaseosa fría, etc.">
    </div>

    <div class="card">
        <label>🍴 Elige tus platos</label>
        <div id="cat-list" class="cat-container"></div>
        <div id="chips-menu" class="chips-container"></div>
    </div>

    <div class="card">
        <label>💳 Medios de Pago (Clic para pagar)</label>
        <div class="pay-grid">
            <a href="https://pago.nequi.com.co" target="_blank" class="pay-btn" style="background:#8233f0;">NEQUI</a>
            <a href="https://www.daviplata.com" target="_blank" class="pay-btn" style="background:#ef4444;">DAVIPLATA</a>
            <a href="#" class="pay-btn" style="background:#00d1b2;">BREVE</a>
        </div>
    </div>

    <div class="card">
        <label>🛒 Tu Pedido</label>
        <div id="resumen-lista"></div>
    </div>
</div>

<div class="compact-footer">
    <div class="footer-content">
        <div>
            <p style="margin:0; font-size:1.5rem; font-weight:900; color:var(--accent);" id="total-val">$0</p>
            <span id="badge-items" style="font-size:11px; font-weight:bold; opacity:0.8;">0 productos</span>
        </div>
        <button class="btn-send" onclick="enviarWhatsApp()">PEDIR POR WHATSAPP</button>
    </div>
</div>

<script>
const WHATSAPP_NEGOCIO = "573142553018"; 
const URL_MENU = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTU3FT66_0vVAygWPIDfjIAhGwnKGWeBhDB3cVrzkMZQRP6M0ONz2_xwy-u8Q7muAoP6oa4QFxXc7xb/pub?output=csv";

let menu = [], pedido = [], tipoServicio = 'local', mesaSeleccionada = "";

// Función para corregir URLs de Google Drive (UC Export)
function fixImageUrl(url) {
    if (!url) return '';
    let id = '';
    if (url.includes('id=')) id = url.split('id=')[1].split('&')[0];
    else if (url.includes('/d/')) id = url.split('/d/')[1].split('/')[0];
    return id ? `https://drive.google.com/uc?export=view&id=${id}` : url;
}

function parseCSV(text) {
    const lines = text.split(/\r?\n/);
    return lines.map(line => {
        const result = [];
        let cur = '', inQuote = false;
        for (let i = 0; i < line.length; i++) {
            let char = line[i];
            if (char === '"') inQuote = !inQuote;
            else if (char === ',' && !inQuote) { result.push(cur); cur = ''; }
            else cur += char;
        }
        result.push(cur);
        return result;
    });
}

async function cargarMenu() {
    try {
        const res = await fetch(URL_MENU);
        const text = await res.text();
        const data = parseCSV(text).slice(1);
        
        menu = data.map(cols => ({
            cat: cols[0]?.trim(), 
            nombre: cols[1]?.trim(), 
            precio: parseInt(cols[3]?.replace(/[^0-9]/g, '')) || 0, 
            img: fixImageUrl(cols[4]?.trim())
        })).filter(m => m.nombre && m.precio > 0);

        renderCategorias();
        crearMesasSelector();
    } catch (e) { console.error("Error cargando menú:", e); }
}

function renderCategorias() {
    const cats = [...new Set(menu.map(m => m.cat))].filter(Boolean);
    const cont = document.getElementById("cat-list");
    cont.innerHTML = cats.map((c, i) => `<button class="btn-cat ${i===0?'active':''}" onclick="filtrarCat('${c}', this)">${c}</button>`).join("");
    if(cats.length) filtrarCat(cats[0], cont.querySelector('.btn-cat'));
}

function filtrarCat(cat, btn) {
    document.querySelectorAll('.btn-cat').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const cont = document.getElementById("chips-menu");
    cont.innerHTML = menu.filter(m => m.cat === cat).map(p => `
        <div class="chip" onclick="agregarAlPedido('${p.nombre}')">
            <img src="${p.img}" loading="lazy" onerror="this.src='https://via.placeholder.com/150?text=Cargando...'">
            <div class="chip-info">
                <b>${p.nombre}</b>
                <span>$${p.precio.toLocaleString('es-CO')}</span>
            </div>
        </div>`).join("");
}

function crearMesasSelector() {
    const cont = document.getElementById("mesas");
    cont.innerHTML = "";
    for(let i=1; i<=12; i++) {
        let b = document.createElement("button"); b.className="btn"; b.textContent=i;
        b.onclick = () => {
            document.querySelectorAll("#mesas .btn").forEach(x => x.classList.remove("active"));
            b.classList.add("active"); mesaSeleccionada = i;
        };
        cont.appendChild(b);
    }
}

function setServicio(t) {
    tipoServicio = t;
    document.getElementById('btnLocal').classList.toggle('active', t === 'local');
    document.getElementById('btnDomi').classList.toggle('active', t === 'domicilio');
    document.getElementById('formDomicilio').classList.toggle('hidden', t === 'local');
    document.getElementById('sectionMesas').classList.toggle('hidden', t === 'domicilio');
    actualizarTotales();
}

function agregarAlPedido(nombre) {
    const item = menu.find(m => m.nombre === nombre);
    pedido.push({...item});
    actualizarResumen();
}

function quitarDelPedido(nombre) {
    const idx = pedido.findLastIndex(p => p.nombre === nombre);
    if(idx !== -1) pedido.splice(idx, 1);
    actualizarResumen();
}

function actualizarResumen() {
    const cont = document.getElementById("resumen-lista");
    const agrupado = pedido.reduce((acc, curr) => {
        if(!acc[curr.nombre]) acc[curr.nombre] = {...curr, cant: 0};
        acc[curr.nombre].cant++;
        return acc;
    }, {});

    cont.innerHTML = Object.values(agrupado).map(p => `
        <div class="item-pedido">
            <div style="flex:1;"><b>${p.nombre}</b><br><small>Cant: ${p.cant}</small></div>
            <b style="margin-right:10px;">$${(p.precio * p.cant).toLocaleString('es-CO')}</b>
            <button class="del-btn" onclick="quitarDelPedido('${p.nombre}')">✕</button>
        </div>`).join("");
    actualizarTotales();
}

function actualizarTotales() {
    let t = pedido.reduce((s, p) => s + p.precio, 0);
    document.getElementById("total-val").textContent = `$${t.toLocaleString('es-CO')}`;
    document.getElementById("badge-items").textContent = `${pedido.length} productos`;
}

function enviarWhatsApp() {
    if(!pedido.length) return alert("El carrito está vacío");
    
    let msg = `🔥 *NUEVO PEDIDO: ASADERO LA ESMERALDA*\n`;
    msg += `━━━━━━━━━━━━━━━━━━\n`;
    
    if(tipoServicio === 'local') {
        if(!mesaSeleccionada) return alert("Por favor selecciona una mesa");
        msg += `📍 *TIPO:* Local 🪑 *MESA:* ${mesaSeleccionada}\n`;
    } else {
        const nom = document.getElementById("domiNombre").value;
        const dir = document.getElementById("domiDir").value;
        if(!nom || !dir) return alert("Completa nombre y dirección");
        msg += `🛵 *TIPO:* Domicilio\n👤 *CLIENTE:* ${nom}\n📍 *DIR:* ${dir}\n`;
    }

    const obs = document.getElementById("observaciones").value;
    if(obs) msg += `📝 *OBS:* ${obs}\n`;

    msg += `━━━━━━━━━━━━━━━━━━\n`;
    const agrupado = pedido.reduce((acc, curr) => {
        acc[curr.nombre] = (acc[curr.nombre] || 0) + 1;
        return acc;
    }, {});

    for(const [nombre, cant] of Object.entries(agrupado)) msg += `✅ ${cant}x ${nombre}\n`;

    msg += `━━━━━━━━━━━━━━━━━━\n`;
    msg += `💰 *TOTAL A PAGAR: ${document.getElementById("total-val").textContent}*`;
    
    window.open(`https://wa.me/${WHATSAPP_NEGOCIO}?text=${encodeURIComponent(msg)}`);
}

cargarMenu();
</script>
</body>
</html>
